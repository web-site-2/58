<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="تجربة رومانسية تفاعلية">
  <title>الويب سايت بتاعنا💝</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="hearts-canvas" aria-hidden="true"></canvas>

  <section id="gate" class="screen screen-visible">
    <div class="panel gate-panel">
      <p class="mystery">كلمه سر واحده انا وانتي بس اللي نعرفها</p>
      <h1>اكتبي كلمة السر عشان نبدأ ❤️‍🩹 </h1>
      <form id="password-form" class="password-form">
        <input id="password-input" type="password" placeholder="كلمة السر" autocomplete="off" required>
        <button class="primary-btn" type="submit">اضغطي هنا</button>
      </form>
      <p id="password-error" class="error-message" aria-live="polite"></p>
    </div>
  </section>

  <main id="app" class="screen">
    <section id="countdown-scene" class="scene hidden">
      <div class="panel">
        <h2 class="typing" data-text="من اول مره اتقابلنا..."></h2>
        <p class="count-intro">العداد ده بيحسب كل ثانيه كنا فيها مع بعض من <strong>15 مايو 2023</strong>.</p>
        <div class="count-grid">
          <div class="count-item"><span id="days">0</span><small>يوم</small></div>
          <div class="count-item"><span id="hours">0</span><small>ساعة</small></div>
          <div class="count-item"><span id="minutes">0</span><small>دقيقة</small></div>
          <div class="count-item"><span id="seconds">0</span><small>ثانية</small></div>
        </div>
        <div class="count-details">
          <p>حوالي تقريبًا: <span id="weeks">0</span> أسبوع + <span id="remaining-days">0</span> أيام</p>
          <p>ولغاية اللحظه دي: <span id="total-hours">0</span> ساعة سوا 💗</p>
        </div>
        <button class="next-btn" type="button" data-next="msg-1">التالي</button>
      </div>
    </section>

    <section id="msg-1" class="scene hidden">
      <div class="panel">
        <h3>اولا كدا</h3>
        <p class="typing" data-text="مهما حصل بيننا ومهما عدا علطول هنبقي مع بعض ولبعض علطول 🫶🏻"></p>
        <button class="next-btn" type="button" data-next="msg-2">التالي</button>
      </div>
    </section>

    <section id="msg-2" class="scene hidden">
      <div class="panel">
        <h3>تاني حاجه</h3>
        <p class="typing" data-text="من يوم ما شوفتك كنت عارف اننا هنبقي لبعض وكل يوم بتأكد من كدا وعايزنا علطول سوا ومع بعض🤍"></p>
        <button class="next-btn" type="button" data-next="msg-3">التالي</button>
      </div>
    </section>

    <section id="msg-3" class="scene hidden">
      <div class="panel">
        <h3>تالت حاجه</h3>
        <p class="typing" data-text="انا اسف علي كل حاجه عملتها...الويب سايت ده عامله لينا عشان يفكرنا بكل حاجه حلوه حصلت وكل ثانيه كنا مع بعض فيها💕"></p>
        <button class="next-btn" type="button" data-next="gallery">التالي</button>
      </div>
    </section>

    <section id="gallery" class="scene hidden">
      <div class="panel">
        <h3 class="typing" data-text="الايام اللي قضيناها سوا 😍"></h3>
        <div class="gallery-grid">
          <figure class="photo-card">
            <img src="https://iili.io/BLRt0hu.jpg?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 1" loading="lazy">
            <figcaption>اول خروجه لينا</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="https://iili.io/BLRtGBj.jpg?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 2" loading="lazy">
            <figcaption>عيد ميلادك</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="https://iili.io/BLRtap9.jpg?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 3" loading="lazy">
            <figcaption>احلي يوم بالنسبالي</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="https://iili.io/BLRtVrQ.md.jpg?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 4" loading="lazy">
            <figcaption>اول سنه لينا سوا</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="https://iili.io/BLRtjkP.png?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 5" loading="lazy">
            <figcaption>تاني سنه لينا سوا</figcaption>
          </figure>
          <figure class="photo-card">
            <img src="https://iili.io/BLRtlIe.jpg?auto=format&fit=crop&w=1000&q=80" alt="ذكرى رومانسية 6" loading="lazy">
            <figcaption>خطوبتنا💖</figcaption>
          </figure>
        </div>
        <div class="music-box">
          <p class="music-title">اغنيتنا 🤍</p>
          <audio id="romantic-audio" controls loop preload="metadata">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
          </audio>
        </div>
        <button class="next-btn" type="button" data-next="finale">التالي</button>
      </div>
    </section>

    <section id="finale" class="scene hidden">
      <div class="panel final-panel">
        <h2>اخر حاجه...</h2>
        <p id="final-typing" class="typing" data-text="كل حاجه كويسه حصلت وحاجه وحشه حصلت كنا فيها مع بعض خليكي فاكره اني بحبك علطول واسف❤️"></p>
        <button id="replay-hearts" class="primary-btn" type="button">بحبك💖</button>
        <button id="show-memories-again" class="next-btn" type="button">صورنا سوا واغنيتنا ✨</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
